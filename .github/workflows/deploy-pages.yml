name: Deploy istok to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "content/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Один live deploy за раз; новый push отменяет предыдущий запущенный.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Validate content (Zod)
        run: bun run validate:content

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
        run: bun run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
