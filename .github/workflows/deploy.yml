name: Deploy istok to production

# new.istokmebel.by: docker build → GHCR → ssh deploy на sync-agency сервер
# (89.169.54.11). Канон агентства (референс moreminsk, см.
# sync-agency-server/docs/40 - Architecture/Deploy pattern). Заменяет прежний
# GitHub Pages деплой (ADR-009 supersedes ADR-008).

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "content/**"
      - "infra/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Один активный деплой; новый push ждёт текущего, не отменяет.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/istok

jobs:
  # Гейт перед сборкой образа: lint + typecheck + Zod-валидация контента.
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run validate:content

  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # GHCR login через встроенный GITHUB_TOKEN — образ привязывается к репо.
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          # Два тега: latest для compose pull, sha для rollback.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          # gha cache — ускоряет повторные сборки за счёт layer-reuse.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: SSH + compose pull/up
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: 89.169.54.11
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          # GHCR auth по эфемерному GITHUB_TOKEN — на сервере credentials
          # не хранятся, логин/логаут оборачивает pull.
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/istok
            docker compose pull
            docker compose up -d --remove-orphans
            docker logout ghcr.io
            docker image prune -f
