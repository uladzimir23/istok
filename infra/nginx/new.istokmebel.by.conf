# Host-side reverse proxy: new.istokmebel.by → docker container 127.0.0.1:3007.
# Копировать в /etc/nginx/sites-enabled/new.istokmebel.by.conf на сервере.
#
# После первого деплоя запустить:
#   certbot --nginx -d new.istokmebel.by
# certbot перепишет этот файл — добавит 443 server + redirect 80 → 443.
#
# new.istokmebel.by — preview-поддомен (apex istokmebel.by пока на Tilda).

server {
  listen 80;
  listen [::]:80;
  server_name new.istokmebel.by;

  # ACME challenge для certbot — обычно автоматически, но защищаем явно.
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    proxy_pass http://127.0.0.1:3007;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
  }
}
