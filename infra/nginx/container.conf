# Container-side nginx: раздаёт Next.js static export, собранный в образ.
# Host-nginx (сервер 89.169.54.11) терминирует HTTPS и проксирует
# new.istokmebel.by → 127.0.0.1:3007 → этот контейнер.
# См. infra/nginx/new.istokmebel.by.conf.
#
# next.config.ts: trailingSlash:true → каждая страница лежит как
# out/<path>/index.html; try_files подбирает корректно.

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  # Long-cache для hashed assets Next.js — immutable.
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Картинки/видео/шрифты из public/ — кэш на сутки, оригинальный путь.
  location ~* \.(?:png|jpg|jpeg|webp|avif|gif|svg|ico|mp4|webm|woff2?|ttf|otf)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # sitemap.xml / robots.txt — пересчитываем чаще.
  location ~* \.(xml|txt)$ {
    expires 1h;
    try_files $uri =404;
  }

  # HTML — без кэша, чтобы деплои распространялись сразу.
  location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
  }

  # Маршруты static export: папки с index.html. trailingSlash:true.
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;
}
